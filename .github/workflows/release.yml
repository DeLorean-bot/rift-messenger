name: Publish RIFT

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run test:e2e -- --reporter=line
      # Build the Vite frontend with relative asset paths for file:// loading.
      - run: npm run build
        env:
          ELECTRON: '1'
      # Package + publish the Electron installer + latest.yml to GitHub Releases.
      - run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
